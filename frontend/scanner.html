<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - AttendancePro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-gray-light no-scroll">
    <nav class="navbar dashboard-navbar navbar-border flex-between">
        <div class="logo">
            <i class="ph-fill ph-fingerprint text-primary"></i>
            <span>Attendance Portal</span>
        </div>

        <div class="nav-right">
            <a href="{% url 'settings' %}" class="nav-link">Settings</a>
            <button class="icon-btn-rounded mx-2">
                <i class="ph-fill ph-bell"></i>
            </button>
            <div class="profile-avatar">
                <img src="https://i.pravatar.cc/150?img=32" alt="Profile">
            </div>
        </div>
    </nav>

    <main class="scanner-page">
        <div class="scanner-card">
            <header class="scanner-header">
                <h1 class="scanner-title">Face Recognition Check-In</h1>
                <p class="scanner-subtitle">Position your face within the frame for secure biometric verification.</p>
            </header>

            <section class="scanner-center">
                <div class="scanner-circle-container">
                    <div class="scanner-ring-outer"></div>
                    <div class="scanner-feed-circle">
                        <video id="scannerVideo" autoplay playsinline muted></video>
                        <canvas id="scannerOverlay" class="scanner-overlay" aria-hidden="true"></canvas>
                        <div class="scanner-hint">
                            <i class="ph-fill ph-user-circle"></i>
                        </div>
                    </div>
                </div>

                <div class="scanner-status" id="scannerStatus">
                    <i class="ph-fill ph-video-camera animation-pulse"></i>
                    <span id="scannerStatusText">Scanning... Please look directly into the camera</span>
                </div>

                <div class="scanner-actions">
                    <button id="scannerCancel" class="btn btn-outline btn-md">
                        <i class="ph-bold ph-x"></i> Cancel
                    </button>
                    <button id="scannerRetry" class="btn btn-primary btn-md">
                        <i class="ph-bold ph-arrows-clockwise"></i> Retry
                    </button>
                </div>
            </section>

            <footer class="scanner-footer">
                <p class="scanner-footer-text"><i class="ph-fill ph-lock-key"></i> Secure biometric data encrypted</p>
                <p class="scanner-footer-copy">© 2024 Attendance Portal. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <script>
        const video = document.getElementById('scannerVideo');
        const overlay = document.getElementById('scannerOverlay');
        const statusText = document.getElementById('scannerStatusText');
        const scannerStatus = document.getElementById('scannerStatus');
        const cancelBtn = document.getElementById('scannerCancel');
        const retryBtn = document.getElementById('scannerRetry');

        let scanInterval = null;
        let scanning = false;

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function setStatus(text, type = 'info') {
            statusText.textContent = text;
            if (type === 'error') {
                scannerStatus.style.color = '#dc2626';
            } else if (type === 'success') {
                scannerStatus.style.color = '#16a34a';
            } else {
                scannerStatus.style.color = '#0b69ff';
            }
        }

        function updateOverlaySize() {
            const rect = video.getBoundingClientRect();
            overlay.width = rect.width;
            overlay.height = rect.height;
            overlay.style.width = `${rect.width}px`;
            overlay.style.height = `${rect.height}px`;
        }

        function clearOverlay() {
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    updateOverlaySize();
                };
            } catch (err) {
                setStatus('Camera access denied. Please allow camera permission.', 'error');
            }
        }

        async function scanFrame() {
            if (!video.srcObject) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

            try {
                const response = await fetch('{% url "signin-scan" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({ image: dataUrl }),
                });

                const result = await response.json();
                if (result.success) {
                    setStatus(`Attendance recorded for ${result.name}. Redirecting...`, 'success');
                    if (scanInterval) clearInterval(scanInterval);

                    const timestamp = result.timestamp ? new Date(result.timestamp) : new Date();
                    const date = timestamp.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
                    const time = timestamp.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    setTimeout(() => {
                        const params = new URLSearchParams({ name: result.name || '', date, time });
                        window.location.href = `/signin/success/?${params.toString()}`;
                    }, 900);
                    return;
                }

                if (result.box) {
                    const [x1, y1, x2, y2] = result.box;
                    const faceArea = (x2 - x1) * (y2 - y1);
                    const frameArea = video.videoWidth * video.videoHeight;
                    const ratio = faceArea / frameArea;

                    if (ratio < 0.06) {
                        setStatus('Move closer to the camera.', 'error');
                    } else if (ratio > 0.35) {
                        setStatus('Move a bit away from the camera.', 'error');
                    } else {
                        setStatus('Hold still and look at the camera.', 'info');
                    }
                } else {
                    setStatus('No face detected. Please center your face.', 'error');
                }
            } catch (err) {
                setStatus('Error communicating with server. Please try again.', 'error');
            }
        }

        function beginScan() {
            if (scanning) return;
            scanning = true;
            setStatus('Scanning... Please look directly into the camera', 'info');
            scanInterval = setInterval(scanFrame, 900);
        }

        function stopScan() {
            if (!scanning) return;
            scanning = false;
            if (scanInterval) clearInterval(scanInterval);
            setStatus('Scan paused. Press retry to continue.', 'error');
        }

        cancelBtn.addEventListener('click', () => {
            stopScan();
            window.location.href = '{% url "dashboard" %}';
        });

        retryBtn.addEventListener('click', () => {
            beginScan();
        });

        window.addEventListener('resize', updateOverlaySize);
        startCamera().then(beginScan);
    </script>
</body>

</html>
